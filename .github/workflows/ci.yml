name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 22d: plain Maven build (Eclipse bundles from Maven Central; no Tycho, no p2).
    - name: Build
      shell: bash
      run: mvn -B -f build/pom.xml install

    # The full suite runs in-framework (the tycho-surefire replacement): the boot
    # module starts Equinox, installs the test fragments, runs JUnit inside.
    # Exit code = failed-test count.
    - name: Test (in-framework)
      timeout-minutes: 75
      shell: bash
      run: |
        # Sprint 27 D1: the embedder's Vector API backend, GUARDED. A JVM given
        # --add-modules for a module it lacks REFUSES TO START, and CI spans
        # several OS images — probe, never assume. Absent = the scalar backend,
        # which is correct and only slower, so this never fails the build.
        VECTOR=""
        if java --add-modules jdk.incubator.vector -version >/dev/null 2>&1; then
          VECTOR="--add-modules jdk.incubator.vector"
        else
          echo "note: jdk.incubator.vector unavailable — scalar backend"
        fi
        java $VECTOR \
             -Djawata.test.fixtures="$PWD/org.jawata.core.tests/test-resources/sample-projects" \
             -Djawata.experience.shared.dir="$RUNNER_TEMP/jawata-test-store" \
             -jar build/dist/target/dist/jawata.jar -runTests 2>&1 | tee test-run.log
        test ${PIPESTATUS[0]} -eq 0

    - name: Upload test log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-log-${{ matrix.os }}
        path: test-run.log
